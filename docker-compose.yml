version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: school-management-app:latest
    container_name: school-management-app
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    container_name: school-management-web
    depends_on:
      - app
    ports:
      - "8088:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-management-queue
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120"]
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-management-scheduler
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["sh", "-lc", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: school-management-mysql
    environment:
      MYSQL_DATABASE: school_management
      MYSQL_USER: school
      MYSQL_PASSWORD: schoolpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: school-management-redis
    ports:
      - "6380:6379"
    restart: unless-stopped

volumes:
  mysql_data:
